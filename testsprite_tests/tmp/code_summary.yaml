version: "2"
type: frontend
tech_stack:
  - TypeScript
  - React 19
  - Vite
  - Material-UI (MUI)
  - React Router
  - Axios
  - Day.js
  - Recharts
routes:
  - path: /login
    file: src/pages/Login.tsx
    auth_required: false
    description: User login page with role-based authentication
  - path: /dashboard
    file: src/pages/MemberDashboard.tsx
    auth_required: true
    description: Member dashboard showing upcoming sessions, program progress, and weight tracking
  - path: /booking
    file: src/pages/BookingSessions.tsx
    auth_required: true
    description: Book coaching sessions from available time slots
  - path: /programs
    file: src/pages/TrainingPrograms.tsx
    auth_required: true
    description: View assigned training programs with exercises and nutrition plans
  - path: /weight-tracking
    file: src/pages/WeightTracking.tsx
    auth_required: true
    description: Track and visualize weight progress over time
  - path: /coach-dashboard
    file: src/pages/CoachDashboard.tsx
    auth_required: true
    description: Coach dashboard showing member progress and upcoming sessions
  - path: /program-management
    file: src/pages/ProgramManagement.tsx
    auth_required: true
    description: Create and manage training programs for members
  - path: /manage-availability
    file: src/pages/ManageAvailability.tsx
    auth_required: true
    description: Manage available time slots for coaching sessions
features:
  - name: User Login
    description: Login with email and password credentials for member or coach roles
    files:
      - src/pages/Login.tsx
      - src/contexts/AuthContext.tsx
    entry_route: /login
    user_interactions:
      - Fill email input field
      - Fill password input field
      - Click Login button to submit
      - See error message on invalid credentials
      - Use test account buttons to auto-fill credentials
    api_calls: []
    auth_required: false
    depends_on: []
  - name: Member Dashboard
    description: View personal training overview including upcoming sessions, program progress, and weight trends
    files:
      - src/pages/MemberDashboard.tsx
      - src/contexts/DataContext.tsx
      - src/services/api.ts
    entry_route: /dashboard
    user_interactions:
      - View countdown timer for next session
      - See list of upcoming sessions
      - View training program progress with daily tasks
      - Check recent weight entries and progress chart
      - Click quick navigation buttons to other sections
    api_calls:
      - method: GET
        endpoint: /api/sessions
      - method: GET
        endpoint: /api/programs
      - method: GET
        endpoint: /api/weight-entries
    auth_required: true
    depends_on: ["User Login"]
  - name: Book Coaching Sessions
    description: Browse and book available coaching time slots
    files:
      - src/pages/BookingSessions.tsx
      - src/services/api.ts
    entry_route: /booking
    user_interactions:
      - View calendar of available sessions
      - Filter sessions by date
      - Click Book button on available time slot
      - Confirm booking in dialog
      - View booked sessions list
      - Cancel booked sessions
    api_calls:
      - method: GET
        endpoint: /api/available-slots
      - method: POST
        endpoint: /api/book-session
      - method: PUT
        endpoint: /api/sessions/:id
    auth_required: true
    depends_on: ["User Login"]
  - name: View Training Programs
    description: View detailed training program including exercises, nutrition, and daily tasks
    files:
      - src/pages/TrainingPrograms.tsx
      - src/services/api.ts
    entry_route: /programs
    user_interactions:
      - View weekly exercise plan
      - See nutrition guidelines
      - Read trainer guidance notes
      - Check daily task checklist
      - Toggle task completion status
    api_calls:
      - method: GET
        endpoint: /api/programs
      - method: PUT
        endpoint: /api/programs/:id
    auth_required: true
    depends_on: ["User Login"]
  - name: Weight Tracking
    description: Log and visualize weight progress over time with charts
    files:
      - src/pages/WeightTracking.tsx
      - src/services/api.ts
    entry_route: /weight-tracking
    user_interactions:
      - View weight progress line chart
      - Add new weight entry with date picker
      - Enter weight value
      - Add optional notes
      - Submit new weight entry
      - View history table of all entries
    api_calls:
      - method: GET
        endpoint: /api/weight-entries
      - method: POST
        endpoint: /api/weight-entries
    auth_required: true
    depends_on: ["User Login"]
  - name: Coach Dashboard
    description: View member progress, session statistics, and upcoming schedule
    files:
      - src/pages/CoachDashboard.tsx
      - src/services/api.ts
    entry_route: /coach-dashboard
    user_interactions:
      - View total members count
      - See completed sessions this week
      - Check active programs count
      - View today's session schedule
      - See upcoming sessions list
      - Monitor member progress table
      - Navigate to program management or availability management
    api_calls:
      - method: GET
        endpoint: /api/sessions
      - method: GET
        endpoint: /api/programs
      - method: GET
        endpoint: /api/weight-entries
    auth_required: true
    depends_on: ["User Login"]
  - name: Manage Training Programs
    description: Create and manage personalized training programs for members
    files:
      - src/pages/ProgramManagement.tsx
      - src/services/api.ts
    entry_route: /program-management
    user_interactions:
      - View list of existing programs
      - Click Create New Program button
      - Select member from dropdown
      - Enter program title
      - Add nutrition guidelines
      - Enter trainer guidance
      - Add weekly exercise plan by day
      - Add daily tasks
      - Submit to create program
      - View program details in expandable cards
    api_calls:
      - method: GET
        endpoint: /api/programs
      - method: POST
        endpoint: /api/programs
    auth_required: true
    depends_on: ["User Login"]
  - name: Manage Availability
    description: Create and manage available time slots for coaching sessions
    files:
      - src/pages/ManageAvailability.tsx
      - src/services/api.ts
    entry_route: /manage-availability
    user_interactions:
      - View list of available and booked slots
      - Select date with date picker
      - Select time with time picker
      - Click Add Slot button to create availability
      - See visual indicators for booked vs available slots
      - Delete available slots
    api_calls:
      - method: GET
        endpoint: /api/available-slots
      - method: POST
        endpoint: /api/available-slots
      - method: DELETE
        endpoint: /api/available-slots/:id
    auth_required: true
    depends_on: ["User Login"]
known_limitations:
  - issue: Authentication uses localStorage only, not connected to backend API
    location: src/contexts/AuthContext.tsx
    impact: Login credentials are validated against hardcoded test accounts, sessions persist in localStorage only
  - issue: Test accounts have hardcoded credentials in the codebase
    location: src/contexts/AuthContext.tsx (lines 26-38)
    impact: Security concern - credentials visible in source code
